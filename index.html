<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇹🇷 Turkey Holiday Awards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; color: #1a1a1a; }

  .screen { display: none; }
  .screen.active { display: block; }

  /* NAME ENTRY */
  .name-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .name-card { background: white; border-radius: 20px; padding: 2.5rem 2rem; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .flag { font-size: 56px; margin-bottom: 1rem; }
  .name-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 0.5rem; }
  .name-card p { font-size: 15px; color: #666; margin-bottom: 2rem; line-height: 1.5; }
  .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .name-pick { padding: 12px; border-radius: 12px; border: 2px solid #e5e5e5; background: white; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: #1a1a1a; }
  .name-pick:hover { border-color: #4a90d9; background: #f0f7ff; }
  .name-pick.selected { border-color: #2563eb; background: #2563eb; color: white; }
  .start-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #2563eb; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .start-btn:hover { opacity: 0.9; }
  .start-btn:disabled { opacity: 0.4; cursor: default; }
  .already-done { margin-top: 1rem; font-size: 13px; color: #999; }

  /* QUIZ */
  .quiz-screen { min-height: 100vh; padding: 1.5rem 1rem 6rem; max-width: 520px; margin: 0 auto; }
  .quiz-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .quiz-top .user-tag { font-size: 13px; font-weight: 600; color: #2563eb; background: #eff6ff; padding: 4px 12px; border-radius: 99px; }
  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-bar-bg { background: #e5e5e5; border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar-fill { background: #2563eb; height: 100%; border-radius: 99px; transition: width 0.3s; }
  .progress-txt { font-size: 12px; color: #999; margin-top: 4px; text-align: right; }
  .cat-badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 99px; margin-bottom: 8px; background: #f0f7ff; color: #2563eb; }
  .q-num { font-size: 12px; color: #aaa; margin-bottom: 4px; }
  .q-text { font-size: 18px; font-weight: 700; margin-bottom: 1.5rem; line-height: 1.4; }
  .names-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .name-btn { padding: 12px 10px; border-radius: 12px; border: 2px solid #e5e5e5; background: white; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: #1a1a1a; text-align: center; }
  .name-btn:hover { border-color: #93c5fd; background: #f0f7ff; }
  .name-btn.selected { border-color: #2563eb; background: #2563eb; color: white; }
  .name-btn.self-disabled { background: #f5f5f5; border-color: #e5e5e5; color: #bbb; cursor: not-allowed; font-style: italic; }
  .name-btn.self-disabled:hover { background: #f5f5f5; border-color: #e5e5e5; }
  .nav-row { display: flex; gap: 8px; }
  .nav-btn { flex: 1; padding: 13px; border-radius: 12px; border: 2px solid #e5e5e5; background: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; color: #1a1a1a; }
  .nav-btn:hover { background: #f5f5f5; }
  .nav-btn.primary { background: #2563eb; border-color: #2563eb; color: white; }
  .nav-btn.primary:hover { opacity: 0.9; }
  .nav-btn:disabled { opacity: 0.35; cursor: default; }
  .skip-btn { flex: 0.5; background: transparent; border-color: transparent; color: #aaa; font-size: 14px; }
  .skip-btn:hover { background: #f5f5f5; border-color: #e5e5e5; }

  /* SUBMITTED */
  .submitted-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .submitted-card { background: white; border-radius: 20px; padding: 2.5rem 2rem; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .submitted-card .big-emoji { font-size: 64px; margin-bottom: 1rem; }
  .submitted-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 0.5rem; }
  .submitted-card p { font-size: 15px; color: #666; line-height: 1.5; }
  .results-link-btn { display: block; margin-top: 1.5rem; padding: 13px; border-radius: 12px; background: #2563eb; color: white; font-size: 15px; font-weight: 600; cursor: pointer; border: none; width: 100%; }

  /* RESULTS */
  .results-screen { padding: 1.5rem 1rem 4rem; max-width: 560px; margin: 0 auto; }
  .results-header { text-align: center; margin-bottom: 2rem; }
  .results-header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .results-header p { font-size: 14px; color: #888; }
  .cat-section { margin-bottom: 2rem; }
  .cat-title { font-size: 13px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.06em; padding: 0 0 8px; border-bottom: 1.5px solid #e5e5e5; margin-bottom: 12px; }
  .result-card { background: white; border-radius: 14px; padding: 14px 16px; margin-bottom: 8px; }
  .result-q { font-size: 13px; color: #888; margin-bottom: 6px; }
  .result-bars { display: flex; flex-direction: column; gap: 5px; }
  .bar-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .bar-name { min-width: 64px; font-weight: 500; color: #1a1a1a; }
  .bar-wrap { flex: 1; background: #f0f0f0; border-radius: 99px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; background: #93c5fd; transition: width 0.4s; }
  .bar-fill.winner { background: #2563eb; }
  .bar-count { min-width: 20px; text-align: right; color: #888; font-size: 12px; }
  .winner-label { font-size: 11px; font-weight: 700; color: #2563eb; margin-left: 4px; }
  .no-votes { font-size: 13px; color: #bbb; font-style: italic; }
  .voters-summary { background: white; border-radius: 14px; padding: 14px 16px; margin-bottom: 2rem; }
  .voters-summary h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .voter-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .voter-pill { font-size: 12px; padding: 3px 10px; border-radius: 99px; background: #eff6ff; color: #2563eb; font-weight: 500; }
  .voter-pill.pending { background: #f5f5f5; color: #aaa; }
  .refresh-btn { display: block; margin: 0 auto 2rem; padding: 10px 24px; border-radius: 12px; border: 2px solid #e5e5e5; background: white; font-size: 14px; font-weight: 600; cursor: pointer; color: #1a1a1a; }
  .refresh-btn:hover { background: #f5f5f5; }
  .loading { text-align: center; padding: 4rem; color: #aaa; font-size: 15px; }

  /* NAV TABS */
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e5e5; display: flex; z-index: 100; }
  .tab-btn { flex: 1; padding: 12px 8px 16px; border: none; background: transparent; font-size: 13px; font-weight: 600; cursor: pointer; color: #aaa; transition: color 0.15s; }
  .tab-btn.active { color: #2563eb; }
</style>
</head>
<body>

<!-- NAME ENTRY SCREEN -->
<div id="nameScreen" class="screen active">
  <div class="name-screen">
    <div class="name-card">
      <div class="flag">🇹🇷</div>
      <h1>Turkey Holiday Awards</h1>
      <p>Vote for who deserves each title from the trip. Pick your name to get started!</p>
      <div class="name-grid" id="nameGrid"></div>
      <button class="start-btn" id="startBtn" disabled onclick="startQuiz()">Start voting →</button>
      <p class="already-done" id="alreadyDone"></p>
    </div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quizScreen" class="screen">
  <div class="quiz-screen">
    <div class="quiz-top">
      <span style="font-size:20px">🇹🇷</span>
      <span class="user-tag" id="userTag"></span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-txt" id="progressTxt">0 / 60</div>
    </div>
    <div class="cat-badge" id="catBadge"></div>
    <div class="q-num" id="qNum"></div>
    <div class="q-text" id="qText"></div>
    <div class="names-grid" id="namesGrid"></div>
    <div class="nav-row">
      <button class="nav-btn" id="backBtn" onclick="go(-1)">← Back</button>
      <button class="nav-btn skip-btn" onclick="skip()">Skip</button>
      <button class="nav-btn primary" id="nextBtn" onclick="go(1)">Next →</button>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('quiz')">📝 Quiz</button>
    <button class="tab-btn" onclick="showTab('results')">🏆 Results</button>
  </div>
</div>

<!-- SUBMITTED SCREEN -->
<div id="submittedScreen" class="screen">
  <div class="submitted-screen">
    <div class="submitted-card">
      <div class="big-emoji">🎉</div>
      <h2>Votes submitted!</h2>
      <p>Your answers have been saved. Check the results to see what everyone voted!</p>
      <button class="results-link-btn" onclick="goToResults()">See the results 🏆</button>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="resultsScreen" class="screen">
  <div class="results-screen">
    <div class="results-header">
      <h1>🏆 Turkey Awards</h1>
      <p id="resultsSubtitle">Loading votes...</p>
    </div>
    <div id="votersSummary" class="voters-summary" style="display:none">
      <h3>Who's voted so far</h3>
      <div class="voter-pills" id="voterPills"></div>
    </div>
    <button class="refresh-btn" onclick="loadResults()">↻ Refresh results</button>
    <div id="resultsContent"><div class="loading">Loading...</div></div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn" onclick="showTab('quiz')">📝 Quiz</button>
    <button class="tab-btn active" onclick="showTab('results')">🏆 Results</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqU4IbXLxF2pY8wudmdIa7z3r_WL55VmI",
  authDomain: "turkey-form-1134d.firebaseapp.com",
  projectId: "turkey-form-1134d",
  storageBucket: "turkey-form-1134d.firebasestorage.app",
  messagingSenderId: "121562249312",
  appId: "1:121562249312:web:ae2f13c66a291236216b05"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const NAMES = ["Novo", "Arijit", "Abhijit", "Srijon", "Aush", "Aman", "Eric"];

const QUESTIONS = [
  { id: 1, cat: "🍻 Drinking", q: "Who drank the most?" },
  { id: 2, cat: "🍻 Drinking", q: "Who was the first to suggest a drink every day?" },
  { id: 3, cat: "🍻 Drinking", q: "Who said \"I'm never drinking again\" the most?" },
  { id: 4, cat: "🍻 Drinking", q: "Who had the worst hangover?" },
  { id: 5, cat: "🍻 Drinking", q: "Who somehow woke up fresh after drinking the most?" },
  { id: 6, cat: "🎉 Party", q: "Who was the life of the party?" },
  { id: 7, cat: "🎉 Party", q: "Who danced the most?" },
  { id: 8, cat: "🍽️ Food", q: "Who spent the most money on food?" },
  { id: 9, cat: "🍽️ Food", q: "Who ate the most?" },
  { id: 10, cat: "😴 Sleep", q: "Who woke up the latest every morning?" },
  { id: 11, cat: "😴 Sleep", q: "Who took the longest to get ready?" },
  { id: 12, cat: "😴 Sleep", q: "Who was always the last one ready?" },
  { id: 13, cat: "😴 Sleep", q: "Who was always first ready?" },
  { id: 14, cat: "😴 Sleep", q: "Who slept through the most alarms?" },
  { id: 15, cat: "😴 Sleep", q: "Who could sleep anywhere?" },
  { id: 16, cat: "📸 Photos", q: "Who spent the most time by the pool/beach?" },
  { id: 17, cat: "📸 Photos", q: "Who spent the most time taking the perfect photo?" },
  { id: 18, cat: "📸 Photos", q: "Who took the most photos/videos?" },
  { id: 19, cat: "📸 Photos", q: "Who made the best Instagram content?" },
  { id: 20, cat: "📸 Photos", q: "Who was everyone's personal photographer?" },
  { id: 21, cat: "📸 Photos", q: "Who has the best holiday camera roll?" },
  { id: 22, cat: "😂 Vibes", q: "Who was the loudest?" },
  { id: 23, cat: "😂 Vibes", q: "Who had the most dramatic moment?" },
  { id: 24, cat: "😂 Vibes", q: "Who was the biggest comedian?" },
  { id: 25, cat: "😂 Vibes", q: "Who had the funniest one-liner?" },
  { id: 26, cat: "😂 Vibes", q: "Who accidentally became the main character?" },
  { id: 27, cat: "😂 Vibes", q: "Who was the biggest gossip?" },
  { id: 28, cat: "👨‍👩‍👧 Group", q: "Who was the group mum?" },
  { id: 29, cat: "👨‍👩‍👧 Group", q: "Who was the group dad?" },
  { id: 30, cat: "👨‍👩‍👧 Group", q: "Who kept everyone together?" },
  { id: 31, cat: "👨‍👩‍👧 Group", q: "Who always knew the plan?" },
  { id: 32, cat: "👨‍👩‍👧 Group", q: "Who reminded everyone to drink water/sunscreen?" },
  { id: 33, cat: "👨‍👩‍👧 Group", q: "Who made sure nobody was left behind?" },
  { id: 34, cat: "👨‍👩‍👧 Group", q: "Who carried everyone's stuff?" },
  { id: 35, cat: "🤦 Chaos", q: "Who got lost the most?" },
  { id: 36, cat: "🤦 Chaos", q: "Who was the clumsiest?" },
  { id: 37, cat: "🤦 Chaos", q: "Who caused the most chaos?" },
  { id: 38, cat: "💸 Money", q: "Who spent the most money overall?" },
  { id: 39, cat: "💸 Money", q: "Who bought the most souvenirs?" },
  { id: 40, cat: "💸 Money", q: "Who was the biggest bargain hunter?" },
  { id: 41, cat: "💸 Money", q: "Who always wanted \"just one more thing\" from the market?" },
  { id: 42, cat: "💸 Money", q: "Who was most likely to buy something they didn't need?" },
  { id: 43, cat: "🇹🇷 Turkey life", q: "Who could survive living in Turkey?" },
  { id: 44, cat: "🇹🇷 Turkey life", q: "Who is most likely to move to Turkey?" },
  { id: 45, cat: "🇹🇷 Turkey life", q: "Who learned the most Turkish words?" },
  { id: 46, cat: "🇹🇷 Turkey life", q: "Who is least likely to recover from this holiday?" },
  { id: 47, cat: "🇹🇷 Turkey life", q: "Who will talk about this trip for years?" },
  { id: 48, cat: "🇹🇷 Turkey life", q: "Who is already planning the next holiday?" },
  { id: 49, cat: "🇹🇷 Turkey life", q: "Who is most likely to book another trip tomorrow?" },
  { id: 50, cat: "✨ Glow-up", q: "Who had the biggest holiday glow-up?" },
  { id: 51, cat: "✨ Glow-up", q: "Who gave off the most \"main character\" energy?" },
  { id: 52, cat: "✨ Glow-up", q: "Who would survive the longest if left alone in Turkey?" },
  { id: 53, cat: "✨ Glow-up", q: "Who would make the best holiday tour guide?" },
  { id: 54, cat: "✨ Glow-up", q: "Who had the funniest holiday moment?" },
  { id: 55, cat: "✨ Glow-up", q: "Who had the most unforgettable quote of the trip?" },
  { id: 56, cat: "✨ Glow-up", q: "Who had the best holiday outfit?" },
  { id: 57, cat: "✨ Glow-up", q: "Who packed the worst?" },
  { id: 58, cat: "✨ Glow-up", q: "Who overpacked the most?" },
  { id: 59, cat: "✨ Glow-up", q: "Who underpacked the most?" },
  { id: 60, cat: "✨ Glow-up", q: "Who would everyone choose as their travel partner again?" },
];

let currentUser = null;
let currentQ = 0;
let answers = {};

// Init name screen
const nameGrid = document.getElementById("nameGrid");
NAMES.forEach(n => {
  const btn = document.createElement("button");
  btn.className = "name-pick";
  btn.textContent = n;
  btn.onclick = () => selectName(n);
  nameGrid.appendChild(btn);
});

async function selectName(name) {
  document.querySelectorAll(".name-pick").forEach(b => b.classList.remove("selected"));
  document.querySelector(`.name-pick[data-name="${name}"]`) || [...document.querySelectorAll(".name-pick")].find(b => b.textContent === name).classList.add("selected");
  currentUser = name;
  document.getElementById("startBtn").disabled = false;

  // Check if already voted
  const snap = await getDoc(doc(db, "votes", name));
  if (snap.exists()) {
    document.getElementById("alreadyDone").textContent = `You've already voted, ${name}! You can re-vote to update your answers.`;
    answers = snap.data().answers || {};
  } else {
    document.getElementById("alreadyDone").textContent = "";
    answers = {};
  }
}

window.startQuiz = function() {
  if (!currentUser) return;
  currentQ = 0;
  document.getElementById("userTag").textContent = currentUser;
  showScreen("quizScreen");
  renderQ();
}

window.go = function(dir) {
  if (dir === 1 && currentQ === QUESTIONS.length - 1) {
    submitVotes();
    return;
  }
  currentQ = Math.max(0, Math.min(QUESTIONS.length - 1, currentQ + dir));
  renderQ();
}

window.skip = function() {
  if (currentQ < QUESTIONS.length - 1) { currentQ++; renderQ(); }
  else submitVotes();
}

function renderQ() {
  const q = QUESTIONS[currentQ];
  const pct = Math.round((currentQ / QUESTIONS.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressTxt").textContent = `${currentQ} / ${QUESTIONS.length}`;
  document.getElementById("catBadge").textContent = q.cat;
  document.getElementById("qNum").textContent = `Question ${currentQ + 1}`;
  document.getElementById("qText").textContent = q.q;
  document.getElementById("backBtn").disabled = currentQ === 0;
  document.getElementById("nextBtn").textContent = currentQ === QUESTIONS.length - 1 ? "Submit 🎉" : "Next →";

  const grid = document.getElementById("namesGrid");
  grid.innerHTML = "";
  NAMES.forEach(n => {
    const isSelf = n === currentUser;
    const btn = document.createElement("button");
    btn.className = "name-btn" + (answers[q.id] === n ? " selected" : "") + (isSelf ? " self-disabled" : "");
    btn.textContent = isSelf ? n + " (you)" : n;
    btn.disabled = isSelf;
    if (!isSelf) {
      btn.onclick = () => {
        answers[q.id] = n;
        renderQ();
      };
    }
    grid.appendChild(btn);
  });
}

async function submitVotes() {
  try {
    await setDoc(doc(db, "votes", currentUser), {
      name: currentUser,
      answers: answers,
      submittedAt: new Date().toISOString()
    });
    showScreen("submittedScreen");
  } catch(e) {
    alert("Error saving votes: " + e.message);
  }
}

window.goToResults = function() {
  showScreen("resultsScreen");
  loadResults();
}

window.loadResults = async function() {
  document.getElementById("resultsContent").innerHTML = '<div class="loading">Loading votes...</div>';
  try {
    const snap = await getDocs(collection(db, "votes"));
    const allVotes = [];
    snap.forEach(d => allVotes.push(d.data()));

    // Voters summary
    const votedNames = allVotes.map(v => v.name);
    const voterPills = document.getElementById("voterPills");
    voterPills.innerHTML = "";
    NAMES.forEach(n => {
      const pill = document.createElement("span");
      pill.className = "voter-pill" + (votedNames.includes(n) ? "" : " pending");
      pill.textContent = votedNames.includes(n) ? "✓ " + n : n + " (pending)";
      voterPills.appendChild(pill);
    });
    document.getElementById("votersSummary").style.display = "block";
    document.getElementById("resultsSubtitle").textContent = `${allVotes.length} of ${NAMES.length} people have voted`;

    // Tally votes per question
    const tallies = {};
    QUESTIONS.forEach(q => { tallies[q.id] = {}; NAMES.forEach(n => tallies[q.id][n] = 0); });
    allVotes.forEach(v => {
      Object.entries(v.answers || {}).forEach(([qid, name]) => {
        if (tallies[qid] && tallies[qid][name] !== undefined) tallies[qid][name]++;
      });
    });

    // Render by category
    const cats = [...new Set(QUESTIONS.map(q => q.cat))];
    let html = "";
    cats.forEach(cat => {
      const qs = QUESTIONS.filter(q => q.cat === cat);
      html += `<div class="cat-section"><div class="cat-title">${cat}</div>`;
      qs.forEach(q => {
        const tally = tallies[q.id];
        const max = Math.max(...Object.values(tally));
        const total = Object.values(tally).reduce((a, b) => a + b, 0);
        html += `<div class="result-card"><div class="result-q">${q.q}</div>`;
        if (total === 0) {
          html += `<div class="no-votes">No votes yet</div>`;
        } else {
          html += `<div class="result-bars">`;
          NAMES.forEach(n => {
            const count = tally[n];
            const pct = max > 0 ? Math.round((count / max) * 100) : 0;
            const isWinner = count === max && max > 0;
            html += `<div class="bar-row">
              <span class="bar-name">${n}${isWinner ? ' 👑' : ''}</span>
              <div class="bar-wrap"><div class="bar-fill${isWinner ? ' winner' : ''}" style="width:${pct}%"></div></div>
              <span class="bar-count">${count}</span>
            </div>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
      });
      html += `</div>`;
    });
    document.getElementById("resultsContent").innerHTML = html;
  } catch(e) {
    document.getElementById("resultsContent").innerHTML = `<div class="loading">Error loading results: ${e.message}</div>`;
  }
}

window.showTab = function(tab) {
  if (tab === "quiz") {
    showScreen("quizScreen");
  } else {
    showScreen("resultsScreen");
    loadResults();
  }
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>
</body>
